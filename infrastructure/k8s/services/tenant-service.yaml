apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
    spec:
      containers:
        - name: tenant-service
          image: payflow/tenant-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          env:
            - name: DATABASE_URL
              value: postgresql://payflow:payflow@postgres:5432/payflow_tenants
            - name: PORT
              value: "3003"
            - name: NODE_ENV
              value: production
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-service
  namespace: payflow
spec:
  selector:
    app: tenant-service
  ports:
    - port: 3003
      targetPort: 3003