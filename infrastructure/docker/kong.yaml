_format_version: "3.0"
_transform: true

services:
  - name: payflow-custom-gateway
    url: http://host.docker.internal:4000
    retries: 3
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: all-routes
        paths:
          - /
        strip_path: false
        preserve_host: true
    plugins:
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid#counter
          echo_downstream: true

      - name: rate-limiting
        config:
          minute: 500
          policy: local
          fault_tolerant: true
          hide_client_headers: false
          limit_by: ip

      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Content-Type
            - Authorization
            - Idempotency-Key
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          credentials: false
          max_age: 3600

      - name: response-transformer
        config:
          add:
            headers:
              - X-Kong-Gateway:true
              - X-API-Version:1.0

      - name: request-transformer
        config:
          add:
            headers:
              - X-Forwarded-Host:host.docker.internal
              - X-Forwarded-Port:8000
              - X-Forwarded-Proto:http