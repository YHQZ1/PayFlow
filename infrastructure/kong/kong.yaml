_format_version: "3.0"
_transform: true

# ─── Services ────────────────────────────────────────────────
services:
  - name: tenant-service
    url: http://host.docker.internal:3003
    routes:
      - name: tenants-route
        paths:
          - /tenants
        strip_path: false

  - name: payment-service
    url: http://host.docker.internal:3000
    routes:
      - name: payments-route
        paths:
          - /payments
        strip_path: false

  - name: ledger-service
    url: http://host.docker.internal:3001
    routes:
      - name: ledger-route
        paths:
          - /ledger
        strip_path: false

  - name: fraud-service
    url: http://host.docker.internal:3002
    routes:
      - name: fraud-route
        paths:
          - /fraud
        strip_path: false

  - name: gateway-service
    url: http://host.docker.internal:3004
    routes:
      - name: gateway-route
        paths:
          - /gateway
        strip_path: false

  - name: payout-service
    url: http://host.docker.internal:3005
    routes:
      - name: payouts-route
        paths:
          - /payouts
        strip_path: false

  - name: reconciliation-service
    url: http://host.docker.internal:3006
    routes:
      - name: reconciliation-route
        paths:
          - /reconciliation
        strip_path: false

# ─── Global plugins ───────────────────────────────────────────
plugins:
  # Request ID tracing on every request
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true

  # Global rate limiting — 100 req/min per consumer
  - name: rate-limiting
    config:
      minute: 100
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # Request/response logging
  - name: file-log
    config:
      path: /dev/stdout
      reopen: false

  # CORS
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
        - Idempotency-Key
        - X-Request-ID
      exposed_headers:
        - X-Request-ID
      credentials: false
      max_age: 3600